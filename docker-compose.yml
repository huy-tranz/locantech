version: '3.9'

services:
  # ─── PostgreSQL Database ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: locan_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: locan
      POSTGRES_PASSWORD: ${DB_PASSWORD:-locan_dev_password}
      POSTGRES_DB: locan_tech_store
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U locan -d locan_tech_store']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API Server ────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: locan_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://locan:${DB_PASSWORD:-locan_dev_password}@db:5432/locan_tech_store
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    ports:
      - '3001:3001'
    volumes:
      - ./server/uploads:/app/uploads
